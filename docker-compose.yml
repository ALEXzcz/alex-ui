version: "3.9"

services:
  app-service:
    image: ${APP_IMAGE}
    container_name: ${CONTAINER_NAME:-alex-ui}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:${CONTAINER_PORT:-8080}"
    networks:
      - app-network

networks:
  app-network:
    name: ${APP_NETWORK:-network}
    external: true
