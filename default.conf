# upstream 是 Nginx 的后端服务池，负责反向代理和负载均衡，使请求可以智能分发到后端服务器。
upstream backend-url {
    server alex-api:8888;  # Nginx 能够访问到的后端地址
}

server {
    listen 80;                   # 监听 80 端口
    server_name _;               # 匹配任意域名或 IP

    root /usr/share/nginx/html;  # 静态文件根目录
    index index.html;            # 默认首页

    # 默认访问 / 的重定向路径
    location = / {
        return 302 http://$http_host/alex/;
    }

    # SPA 路由处理，如果访问路径不存在对应文件，则返回 index.html
    location /alex/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # 如果文件不存在，则返回 404
    location /alex/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri =404;
    }

    # 后端 API 反向代理
    location /api/ {                   # 匹配 /api/ 路径
        proxy_pass http://backend-url; # 转发到 backend-url
        proxy_http_version 1.1;

        # 头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 反向代理
    location /WebSocket {              # 匹配 /WebSocket 路径
        proxy_pass http://backend-url; # 转发到 backend-url
        proxy_http_version 1.1;

        # 头信息
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }
}
